# Config REALMENTE in uso in produzione (2026-07-12), finché non esiste un
# dominio: MKRemote è ancora servito sull'IP nudo (94.177.161.127:443, cert
# self-signed), quindi il Portale usa la stessa IP su una porta diversa.
# Da sostituire con nginx-portal.conf (dominio + Let's Encrypt) appena
# disponibile un dominio reale — vedi deploy/README.md.
server {
    listen 8443 ssl;
    server_name 94.177.161.127;

    ssl_certificate     /etc/ssl/portal/selfsigned.crt;
    ssl_certificate_key /etc/ssl/portal/selfsigned.key;

    client_max_body_size 20M;

    location /api/internal/ {
        allow 127.0.0.1;
        deny all;
        proxy_pass http://unix:/run/portal/gunicorn.sock;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /static/ {
        alias /opt/portal/app/staticfiles/;
    }

    location /media/ {
        alias /opt/portal/app/media/;
    }

    location / {
        proxy_pass http://unix:/run/portal/gunicorn.sock;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
