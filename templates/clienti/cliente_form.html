{% extends "base.html" %}

{% block title %}Cliente — Portale FBO{% endblock %}

{% block content %}
<h1>{% if object %}Modifica cliente{% else %}Nuovo cliente{% endif %}</h1>
<div class="card">
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="btn" type="submit">Salva</button>
        <a class="btn btn-secondary" href="{% url 'cliente-list' %}">Annulla</a>
    </form>
</div>
{% endblock %}
