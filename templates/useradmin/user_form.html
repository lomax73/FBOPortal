{% extends "base.html" %}

{% block title %}Utente — Portale FBO{% endblock %}

{% block content %}
<h1>{% if app_link %}Modifica utente{% else %}Nuovo utente{% endif %}</h1>
{% if app_link %}
<p style="color:#64748b; margin-top:-0.75rem;">{{ username }} su <strong>{{ app_link.name }}</strong></p>
{% endif %}
<div class="card">
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="btn" type="submit">Salva</button>
        <a class="btn btn-secondary" href="{% url 'user-list' %}">Annulla</a>
    </form>
</div>
{% endblock %}
